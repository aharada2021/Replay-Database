name: Build Client Tool

on:
  # mainブランチへのpush時、client_tool配下の変更で実行
  push:
    branches:
      - main
    paths:
      - 'client_tool/**'
  # 手動実行も可能
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (optional, defaults to version in code)'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: client_tool/requirements.txt

      - name: Install FFmpeg
        run: |
          choco install ffmpeg -y
          # Add FFmpeg to PATH for this session
          echo "C:\ProgramData\chocolatey\lib\ffmpeg\tools\ffmpeg\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        working-directory: client_tool
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        working-directory: client_tool
        run: |
          pyinstaller build.spec

      - name: Prepare release files
        working-directory: client_tool
        run: |
          # Create release directory
          mkdir release

          # Copy built executable
          copy dist\wows_replay_uploader.exe release\

          # Copy config template
          copy config.yaml.template release\

          # Copy README
          copy README.md release\

      - name: Create ZIP archive
        working-directory: client_tool
        run: |
          Compress-Archive -Path release\* -DestinationPath wows_replay_uploader.zip

      - name: Get version
        id: version
        working-directory: client_tool
        run: |
          # 手動実行でバージョンが指定された場合はそれを使用
          $inputVersion = "${{ github.event.inputs.version }}"
          if ($inputVersion -ne "") {
            echo "VERSION=$inputVersion" >> $env:GITHUB_OUTPUT
          } else {
            # wows_replay_uploader.py から VERSION を抽出
            $content = Get-Content wows_replay_uploader.py -Raw
            if ($content -match 'VERSION\s*=\s*"([^"]+)"') {
              $version = $matches[1]
              echo "VERSION=$version" >> $env:GITHUB_OUTPUT
            } else {
              echo "VERSION=unknown" >> $env:GITHUB_OUTPUT
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wows_replay_uploader-${{ steps.version.outputs.VERSION }}
          path: client_tool/release/
          retention-days: 30

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: wows_replay_uploader-zip
          path: client_tool/wows_replay_uploader.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: wows_replay_uploader-zip

      - name: Check if release exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG_NAME="client-v${VERSION}"

          # Check if tag already exists
          if gh release view "$TAG_NAME" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
            echo "Release $TAG_NAME already exists"
          else
            echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
            echo "Release $TAG_NAME does not exist"
          fi

      - name: Delete existing release
        if: steps.check_release.outputs.RELEASE_EXISTS == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG_NAME="client-v${VERSION}"
          echo "Deleting existing release: $TAG_NAME"
          gh release delete "$TAG_NAME" --repo ${{ github.repository }} --yes || true
          # Also delete the tag
          git push --delete origin "$TAG_NAME" || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: client-v${{ needs.build.outputs.version }}
          name: WoWS Replay Uploader v${{ needs.build.outputs.version }}
          body: |
            ## WoWS Replay Auto Uploader v${{ needs.build.outputs.version }}

            ### Download
            - `wows_replay_uploader.zip` をダウンロードして展開してください

            ### 含まれるファイル
            - `wows_replay_uploader.exe` - 実行ファイル
            - `config.yaml.template` - 設定ファイルテンプレート
            - `README.md` - 使用方法

            ### 使い方
            1. `config.yaml.template` を `config.yaml` にリネーム
            2. `config.yaml` を編集してAPI KeyとReplay Directoryを設定
            3. `wows_replay_uploader.exe` を実行

            ### 機能
            - リプレイファイルの自動アップロード
            - ゲームプレイ動画のキャプチャ・アップロード
          files: |
            wows_replay_uploader.zip
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
