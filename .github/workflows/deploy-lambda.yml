name: Deploy Lambda Backend

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - development
          - production

jobs:
  setup:
    name: Setup Build Configuration
    runs-on: ubuntu-latest
    outputs:
      account_id: ${{ steps.aws-account.outputs.account_id }}
      stage: ${{ steps.determine-stage.outputs.stage }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account ID: $ACCOUNT_ID"

      - name: Create ECR repository if not exists
        run: |
          REPOSITORY_NAME="wows-replay-bot"
          REGION="ap-northeast-1"

          if ! aws ecr describe-repositories --repository-names $REPOSITORY_NAME --region $REGION &> /dev/null; then
            echo "Creating ECR repository: $REPOSITORY_NAME"
            aws ecr create-repository \
              --repository-name $REPOSITORY_NAME \
              --region $REGION \
              --image-scanning-configuration scanOnPush=true
          else
            echo "ECR repository already exists: $REPOSITORY_NAME"
          fi

      - name: Determine stage
        id: determine-stage
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.environment }}" == "production" ]; then
              STAGE="prod"
            else
              STAGE="dev"
            fi
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            STAGE="prod"
          else
            STAGE="dev"
          fi
          echo "stage=${STAGE}" >> $GITHUB_OUTPUT
          echo "Building for stage: ${STAGE}"

  build-rust:
    name: Build Rust Binary (ARM64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout wows-toolkit
        uses: actions/checkout@v4
        with:
          repository: landaire/wows-toolkit
          # wows-toolkit main branch, includes WoWS 15.x replay parsing support
          ref: 46bcdb26f72a1e2b4bb36bc90126a0a3bdaea250
          path: wows-toolkit-src

      - name: Setup wows-toolkit at expected path
        run: |
          # Cargo.toml expects ../../../wows-toolkit relative to rust/wows-replay-tool/
          # That resolves to $GITHUB_WORKSPACE/../wows-toolkit
          EXPECTED_DIR="$GITHUB_WORKSPACE/../wows-toolkit"
          echo "Placing wows-toolkit at: $EXPECTED_DIR"
          mv wows-toolkit-src "$EXPECTED_DIR"
          ls "$EXPECTED_DIR/Cargo.toml"

      - name: Apply wows-toolkit patches
        run: |
          cd "$GITHUB_WORKSPACE/../wows-toolkit"
          git apply $GITHUB_WORKSPACE/rust/wows-toolkit-patches.patch

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust/wows-replay-tool -> target
          cache-on-failure: true

      - name: Build for aarch64
        run: |
          cd rust/wows-replay-tool
          cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: wows-replay-tool-aarch64
          path: rust/wows-replay-tool/target/aarch64-unknown-linux-gnu/release/wows-replay-tool
          retention-days: 1
          if-no-files-found: error

  build-processor:
    name: Build & Push Processor Image
    runs-on: ubuntu-latest
    needs: [setup, build-rust]
    outputs:
      image_uri: ${{ steps.set-output.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: wows-replay-tool-aarch64
          path: rust/bin/

      - name: Verify Rust binary
        run: |
          ls -la rust/bin/wows-replay-tool
          file rust/bin/wows-replay-tool | grep -q "aarch64" || (echo "ERROR: Binary is not aarch64" && exit 1)
          chmod +x rust/bin/wows-replay-tool

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-northeast-1 | \
            docker login --username AWS --password-stdin ${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Processor Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.processor
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:processor-latest
            ${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:processor-${{ needs.setup.outputs.stage }}
            ${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:processor-${{ github.sha }}
          cache-from: type=registry,ref=${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:processor-buildcache
          cache-to: type=registry,ref=${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:processor-buildcache,mode=max

      - name: Set output
        id: set-output
        run: |
          IMAGE_URI="${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:processor-${{ needs.setup.outputs.stage }}"
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "Processor Image URI: ${IMAGE_URI}"

  build-extractor:
    name: Build & Push Extractor Image
    runs-on: ubuntu-latest
    needs: [setup, build-rust]
    outputs:
      image_uri: ${{ steps.set-output.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: wows-replay-tool-aarch64
          path: rust/bin/

      - name: Verify Rust binary
        run: |
          ls -la rust/bin/wows-replay-tool
          file rust/bin/wows-replay-tool | grep -q "aarch64" || (echo "ERROR: Binary is not aarch64" && exit 1)
          chmod +x rust/bin/wows-replay-tool

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-northeast-1 | \
            docker login --username AWS --password-stdin ${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Extractor Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.extractor
          platforms: linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:extractor-latest
            ${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:extractor-${{ needs.setup.outputs.stage }}
            ${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:extractor-${{ github.sha }}
          cache-from: type=registry,ref=${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:extractor-buildcache
          cache-to: type=registry,ref=${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:extractor-buildcache,mode=max

      - name: Set output
        id: set-output
        run: |
          IMAGE_URI="${{ needs.setup.outputs.account_id }}.dkr.ecr.ap-northeast-1.amazonaws.com/wows-replay-bot:extractor-${{ needs.setup.outputs.stage }}"
          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "Extractor Image URI: ${IMAGE_URI}"

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build-processor, build-extractor]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-serverless-${{ runner.os }}-v1
          restore-keys: |
            npm-serverless-${{ runner.os }}-

      - name: Install Serverless Framework
        run: npm install -g serverless@3

      - name: Deploy to Lambda
        env:
          ECR_PROCESSOR_IMAGE_URI: ${{ needs.build-processor.outputs.image_uri }}
          ECR_EXTRACTOR_IMAGE_URI: ${{ needs.build-extractor.outputs.image_uri }}
          DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          INPUT_CHANNEL_ID: ${{ secrets.INPUT_CHANNEL_ID }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
          UPLOAD_API_KEY: ${{ secrets.UPLOAD_API_KEY }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ALLOWED_GUILD_ID: ${{ secrets.ALLOWED_GUILD_ID }}
          ALLOWED_ROLE_IDS: ${{ secrets.ALLOWED_ROLE_IDS }}
          NOTIFICATION_CHANNEL_ID: ${{ secrets.NOTIFICATION_CHANNEL_ID }}
        run: |
          cd deploy
          serverless deploy --stage dev --region ap-northeast-1

      - name: Get API endpoint
        id: get-endpoint
        run: |
          cd deploy
          ENDPOINT=$(serverless info --stage dev --region ap-northeast-1 | grep "POST - " | awk '{print $3}' | head -n 1)
          echo "endpoint=${ENDPOINT}" >> $GITHUB_OUTPUT
          echo "API Endpoint: ${ENDPOINT}"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary (Development)" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage**: dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Processor Image**: ${{ needs.build-processor.outputs.image_uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Extractor Image**: ${{ needs.build-extractor.outputs.image_uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API Endpoint**: ${{ steps.get-endpoint.outputs.endpoint }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Git SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-processor, build-extractor]
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm global packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-serverless-${{ runner.os }}-v1
          restore-keys: |
            npm-serverless-${{ runner.os }}-

      - name: Install Serverless Framework
        run: npm install -g serverless@3

      - name: Deploy to Lambda (prod)
        env:
          ECR_PROCESSOR_IMAGE_URI: ${{ needs.build-processor.outputs.image_uri }}
          ECR_EXTRACTOR_IMAGE_URI: ${{ needs.build-extractor.outputs.image_uri }}
          DISCORD_PUBLIC_KEY: ${{ secrets.DISCORD_PUBLIC_KEY }}
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          INPUT_CHANNEL_ID: ${{ secrets.INPUT_CHANNEL_ID }}
          GUILD_ID: ${{ secrets.GUILD_ID }}
          UPLOAD_API_KEY: ${{ secrets.UPLOAD_API_KEY }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          ALLOWED_GUILD_ID: ${{ secrets.ALLOWED_GUILD_ID }}
          ALLOWED_ROLE_IDS: ${{ secrets.ALLOWED_ROLE_IDS }}
          NOTIFICATION_CHANNEL_ID: ${{ secrets.NOTIFICATION_CHANNEL_ID }}
        run: |
          cd deploy
          serverless deploy --stage prod --region ap-northeast-1

      - name: Get API endpoint
        id: get-endpoint
        run: |
          cd deploy
          ENDPOINT=$(serverless info --stage prod --region ap-northeast-1 | grep "POST - " | awk '{print $3}' | head -n 1)
          echo "endpoint=${ENDPOINT}" >> $GITHUB_OUTPUT
          echo "API Endpoint: ${ENDPOINT}"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary (Production)" >> $GITHUB_STEP_SUMMARY
          echo "- **Stage**: prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Processor Image**: ${{ needs.build-processor.outputs.image_uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Extractor Image**: ${{ needs.build-extractor.outputs.image_uri }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API Endpoint**: ${{ steps.get-endpoint.outputs.endpoint }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Git SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
